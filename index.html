<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>BRAC Consultation Planner</title>
    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0A0C" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BRAC Planner" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    
    <!-- Splash Screens (Standard iOS) -->
    <link rel="apple-touch-startup-image" href="/icon.svg" />
    <script>
      (function() {
        var saved = localStorage.getItem('brac_dark_mode');
        var isDark = saved !== null ? saved === 'true' : true;
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.colorScheme = 'light';
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-zinc-950 text-slate-900 dark:text-zinc-50 antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
