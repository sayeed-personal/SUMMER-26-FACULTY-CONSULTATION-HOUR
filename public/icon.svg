<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Calendar Header Gradient -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- iOS-like squircle (rounded rectangle) -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bgGrad)" />
  
  <!-- Subtle inner grid lines for "App Design Blueprint" aesthetic -->
  <rect x="40" y="40" width="432" height="432" rx="88" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2" />
  <line x1="256" y1="40" x2="256" y2="472" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5" />
  <line x1="40" y1="256" x2="472" y2="256" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5" />

  <!-- The Calendar Glyph Container with shadow -->
  <g filter="url(#shadow)">
    <!-- Calendar Plate -->
    <rect x="128" y="128" width="256" height="256" rx="36" fill="#ffffff" />
    
    <!-- Calendar Header (Red bar) -->
    <path d="M 128,164 A 36,36 0 0,1 164,128 L 348,128 A 36,36 0 0,1 384,164 L 384,200 L 128,200 Z" fill="url(#headerGrad)" />
    
    <!-- Header Rings / Bindings -->
    <rect x="176" y="104" width="24" height="48" rx="12" fill="#e2e8f0" stroke="#1e293b" stroke-width="4" />
    <rect x="312" y="104" width="24" height="48" rx="12" fill="#e2e8f0" stroke="#1e293b" stroke-width="4" />

    <!-- Calendar Date Grid/Dots -->
    <rect x="168" y="232" width="48" height="40" rx="10" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="2" />
    <rect x="232" y="232" width="48" height="40" rx="10" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="2" />
    <rect x="296" y="232" width="48" height="40" rx="10" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="2" />

    <rect x="168" y="296" width="48" height="40" rx="10" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="2" />
    <!-- Highlighted active cell (middle center) -->
    <rect x="232" y="296" width="48" height="40" rx="10" fill="#3b82f6" />
    <!-- Clock hands inside the active cell -->
    <path d="M256,311 L256,316 L261,316" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <rect x="296" y="296" width="48" height="40" rx="10" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-width="2" />
  </g>
</svg>
